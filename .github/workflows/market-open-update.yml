name: "Market Open Update (8:45 AM CT)"

on:
  schedule:
    # 8:45 AM CST = 14:45 UTC, Mon-Fri
    - cron: "45 14 * * 1-5"
  workflow_dispatch:

jobs:
  generate-and-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Get current date
        id: date
        run: echo "today=$(TZ=America/Chicago date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Run research pipeline (fresh headlines post-open)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
        run: |
          python -m agent.run \
            --date "${{ steps.date.outputs.today }}" \
            --tz America/Chicago \
            --watchlist "AAPL,MSFT,NVDA,AMD,AVGO" \
            --out ./out

      - name: Run recommendations engine (live post-open prices)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o
        run: |
          python -m agent.run_recs \
            --date "${{ steps.date.outputs.today }}" \
            --tz America/Chicago \
            --watchlist "AAPL,MSFT,NVDA,AMD,AVGO" \
            --out ./out \
            --max-allocation 5000

      - name: Build email body
        id: email_body
        run: |
          OUTDIR="out/${{ steps.date.outputs.today }}"
          echo "body<<EMAIL_EOF" >> "$GITHUB_OUTPUT"
          echo "# Market Open Update (8:45 AM CT)" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "> Prices below reflect **live post-open** data (~15 min after market open)." >> "$GITHUB_OUTPUT"
          echo "> Compare with your pre-market email to see how the open changed the picture." >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          cat "$OUTDIR/brief.md" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "---" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          cat "$OUTDIR/recommendations.md" >> "$GITHUB_OUTPUT"
          echo "EMAIL_EOF" >> "$GITHUB_OUTPUT"

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Market Open Update + Recs - ${{ steps.date.outputs.today }}"
          to: ganurag6@gmail.com
          from: ${{ secrets.SMTP_USERNAME }}
          body: ${{ steps.email_body.outputs.body }}
          convert_markdown: true
          attachments: |
            out/${{ steps.date.outputs.today }}/research.json
            out/${{ steps.date.outputs.today }}/recommendations.json
